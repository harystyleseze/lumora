services:
  router:
    build:
      context: .
      dockerfile: apps/router/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./lumora.db:/app/lumora.db
    environment:
      PORT: "3001"
      DATABASE_PATH: /app/lumora.db
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}
      STELLAR_RPC_URL: ${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      USDC_ISSUER: ${USDC_ISSUER:-GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5}
      ROUTER_WALLET_PUBLIC: ${ROUTER_WALLET_PUBLIC}
      ROUTER_WALLET_SECRET: ${ROUTER_WALLET_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
      PAYMENT_EXPIRY_SECONDS: ${PAYMENT_EXPIRY_SECONDS:-300}
      PDF_SERVICE_URL: http://pdf:3002/extract-text
      PDF_SERVICE_URL_JSON: http://pdf:3002/to-json
      SPENDING_POLICY_CONTRACT_ID: ${SPENDING_POLICY_CONTRACT_ID:-}
    depends_on:
      pdf:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  pdf:
    build:
      context: .
      dockerfile: services/pdf/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PDF_SERVICE_PORT: "3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  marketplace:
    build:
      context: .
      dockerfile: apps/marketplace/Dockerfile
      args:
        NEXT_PUBLIC_ROUTER_URL: ${NEXT_PUBLIC_ROUTER_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ROUTER_URL: ${NEXT_PUBLIC_ROUTER_URL:-http://localhost:3001}
      ROUTER_INTERNAL_URL: http://router:3001
    depends_on:
      router:
        condition: service_healthy
    restart: unless-stopped
